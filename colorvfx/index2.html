<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Color VFX 2 — Denis Yudin</title>
  <meta name="description" content="Color VFX — локальный WebGL: загрузка фото и эффект">
  <style>
    :root {
      color-scheme: dark;
      --bar-bg: rgba(12, 12, 14, 0.82);
      --bar-bd: rgba(255, 255, 255, 0.08);
      --text: #f0f0f4;
      --muted: #9898a8;
      --accent: #c45c3e;
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #08080a;
    }

    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    }

    .view {
      width: 100%;
      height: 100vh;
      position: relative;
      overflow: hidden;
    }

    #vfx-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .toolbar {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 10;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      justify-content: flex-end;
      max-width: min(100vw - 24px, 400px);
      padding: 10px 12px;
      border-radius: 12px;
      background: var(--bar-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--bar-bd);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.45);
    }

    .toolbar-note {
      width: 100%;
      font-size: 11px;
      line-height: 1.35;
      color: var(--muted);
      margin: 0;
    }

    .toolbar label.file-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(160deg, var(--accent), #8b3d2a);
      border-radius: 8px;
      cursor: pointer;
      border: none;
      box-shadow: 0 2px 12px rgba(196, 92, 62, 0.35);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .toolbar label.file-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(224, 122, 95, 0.4);
    }

    .toolbar input[type="file"] {
      position: absolute;
      width: 0;
      height: 0;
      opacity: 0;
      pointer-events: none;
    }

    .toolbar a.ghost {
      display: inline-flex;
      align-items: center;
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--bar-bd);
      border-radius: 8px;
      text-decoration: none;
      transition: background 0.15s ease;
    }

    .toolbar a.ghost:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .page-nav {
      position: fixed;
      bottom: 12px;
      left: 12px;
      z-index: 20;
      font-size: 12px;
    }

    .page-nav a {
      color: rgba(255, 255, 255, 0.45);
      text-decoration: none;
      padding: 6px 10px;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: color 0.15s ease, border-color 0.15s ease;
    }

    .page-nav a:hover {
      color: rgba(255, 255, 255, 0.85);
      border-color: rgba(255, 255, 255, 0.2);
    }
  </style>
</head>
<body>
  <div class="toolbar" role="region" aria-label="Управление VFX">
    <p class="toolbar-note">
      Локальный WebGL на сайте (хроматическая аберрация + виньетка по курсору). Это не копия шейдеров Endless Tools.
    </p>
    <label class="file-btn" for="img-input">Загрузить изображение</label>
    <input id="img-input" type="file" accept="image/*">
    <a class="ghost" href="index.html">Оригинал (embed)</a>
  </div>

  <nav class="page-nav" aria-label="Версии страницы">
    <a href="index.html">← Оригинал</a>
  </nav>

  <div class="view">
    <canvas id="vfx-canvas"></canvas>
  </div>

  <script>
(function () {
  var VERT = '' +
    'attribute vec2 a_pos;' +
    'varying vec2 v_uv;' +
    'void main() {' +
    '  v_uv = a_pos * 0.5 + 0.5;' +
    '  gl_Position = vec4(a_pos, 0.0, 1.0);' +
    '}';

  var FRAG = '' +
    'precision mediump float;' +
    'varying vec2 v_uv;' +
    'uniform sampler2D u_tex;' +
    'uniform vec2 u_canvas;' +
    'uniform vec2 u_texSize;' +
    'uniform vec2 u_mouse;' +
    'uniform float u_time;' +
    'vec2 tex_uv_contain(vec2 uv) {' +
    '  float cAsp = u_canvas.x / u_canvas.y;' +
    '  float tAsp = u_texSize.x / u_texSize.y;' +
    '  vec2 scale = vec2(1.0);' +
    '  if (tAsp > cAsp) scale = vec2(cAsp / tAsp, 1.0); else scale = vec2(1.0, tAsp / cAsp);' +
    '  return (uv - 0.5) / scale + 0.5;' +
    '}' +
    'void main() {' +
    '  vec2 suv = tex_uv_contain(v_uv);' +
    '  if (suv.x < 0.0 || suv.x > 1.0 || suv.y < 0.0 || suv.y > 1.0) { gl_FragColor = vec4(0.03, 0.03, 0.04, 1.0); return; }' +
    '  vec2 mp = u_mouse;' +
    '  vec2 delta = suv - mp;' +
    '  float dist = length(delta) + 0.0008;' +
    '  vec2 dir = delta / dist;' +
    '  float pulse = 0.65 + 0.35 * sin(u_time * 2.8);' +
    '  float strength = (0.01 + dist * 0.022) * pulse;' +
    '  vec2 off = dir * strength;' +
    '  float r = texture2D(u_tex, suv + off * 1.15).r;' +
    '  float g = texture2D(u_tex, suv).g;' +
    '  float b = texture2D(u_tex, suv - off * 1.05).b;' +
    '  vec3 col = vec3(r, g, b);' +
    '  float lum = dot(col, vec3(0.299, 0.587, 0.114));' +
    '  col = mix(vec3(lum), col, 1.06);' +
    '  float vig = smoothstep(0.92, 0.38, length(v_uv - 0.5));' +
    '  col *= mix(0.52, 1.08, vig);' +
    '  gl_FragColor = vec4(col, 1.0);' +
    '}';

  function compile(gl, type, src) {
    var sh = gl.createShader(type);
    gl.shaderSource(sh, src);
    gl.compileShader(sh);
    if (!gl.getShaderParameter(sh, gl.COMPILE_STATUS)) {
      console.error(gl.getShaderInfoLog(sh));
      gl.deleteShader(sh);
      return null;
    }
    return sh;
  }

  function createProgram(gl) {
    var vs = compile(gl, gl.VERTEX_SHADER, VERT);
    var fs = compile(gl, gl.FRAGMENT_SHADER, FRAG);
    if (!vs || !fs) return null;
    var p = gl.createProgram();
    gl.attachShader(p, vs);
    gl.attachShader(p, fs);
    gl.linkProgram(p);
    gl.deleteShader(vs);
    gl.deleteShader(fs);
    if (!gl.getProgramParameter(p, gl.LINK_STATUS)) {
      console.error(gl.getProgramInfoLog(p));
      return null;
    }
    return p;
  }

  var canvas = document.getElementById('vfx-canvas');
  var fileInput = document.getElementById('img-input');

  var gl = null;
  var program = null;
  var uniforms = {};
  var buffer = null;
  var tex = null;
  var imgObjectUrl = null;
  var texSize = { w: 1, h: 1 };
  var mouse = [0.5, 0.5];
  var raf = 0;

  function initGl() {
    if (program) return true;
    gl = canvas.getContext('webgl', { alpha: false, premultipliedAlpha: false }) ||
      canvas.getContext('experimental-webgl', { alpha: false });
    if (!gl) return false;
    program = createProgram(gl);
    if (!program) return false;
    gl.useProgram(program);
    var posLoc = gl.getAttribLocation(program, 'a_pos');
    buffer = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([
      -1, -1,
       3, -1,
      -1,  3,
    ]), gl.STATIC_DRAW);
    gl.enableVertexAttribArray(posLoc);
    gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, 0, 0);

    uniforms.u_tex = gl.getUniformLocation(program, 'u_tex');
    uniforms.u_canvas = gl.getUniformLocation(program, 'u_canvas');
    uniforms.u_texSize = gl.getUniformLocation(program, 'u_texSize');
    uniforms.u_mouse = gl.getUniformLocation(program, 'u_mouse');
    uniforms.u_time = gl.getUniformLocation(program, 'u_time');

    tex = gl.createTexture();
    gl.bindTexture(gl.TEXTURE_2D, tex);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
    gl.uniform1i(uniforms.u_tex, 0);

    texSize.w = 1;
    texSize.h = 1;
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, 1, 1, 0, gl.RGBA, gl.UNSIGNED_BYTE,
      new Uint8Array([14, 14, 18, 255]));
    return true;
  }

  function resize() {
    var dpr = Math.min(window.devicePixelRatio || 1, 2);
    var w = Math.floor(canvas.clientWidth * dpr);
    var h = Math.floor(canvas.clientHeight * dpr);
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width = w;
      canvas.height = h;
      if (gl) gl.viewport(0, 0, w, h);
    }
  }

  function setTextureFromImg(img) {
    texSize.w = img.naturalWidth || img.width;
    texSize.h = img.naturalHeight || img.height;
    gl.bindTexture(gl.TEXTURE_2D, tex);
    gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, 1);
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, img);
  }

  function loop(t) {
    raf = requestAnimationFrame(loop);
    resize();
    if (!program) return;
    gl.useProgram(program);
    gl.activeTexture(gl.TEXTURE0);
    gl.bindTexture(gl.TEXTURE_2D, tex);
    gl.uniform2f(uniforms.u_canvas, canvas.width || 1, canvas.height || 1);
    gl.uniform2f(uniforms.u_texSize, texSize.w, texSize.h);
    gl.uniform2f(uniforms.u_mouse, mouse[0], 1 - mouse[1]);
    gl.uniform1f(uniforms.u_time, t * 0.001);
    gl.drawArrays(gl.TRIANGLES, 0, 3);
  }

  canvas.addEventListener('pointermove', function (e) {
    var rect = canvas.getBoundingClientRect();
    if (rect.width < 1 || rect.height < 1) return;
    mouse[0] = (e.clientX - rect.left) / rect.width;
    mouse[1] = (e.clientY - rect.top) / rect.height;
  });

  function startLoopOnce() {
    if (!raf) raf = requestAnimationFrame(loop);
  }

  if (initGl()) startLoopOnce();

  fileInput.addEventListener('change', function () {
    var f = fileInput.files && fileInput.files[0];
    if (!f) return;
    if (!initGl()) {
      alert('WebGL недоступен в этом браузере.');
      return;
    }

    var url = URL.createObjectURL(f);
    if (imgObjectUrl) URL.revokeObjectURL(imgObjectUrl);
    imgObjectUrl = url;

    var img = new Image();
    img.onload = function () {
      resize();
      setTextureFromImg(img);
      startLoopOnce();
      fileInput.value = '';
    };
    img.onerror = function () {
      URL.revokeObjectURL(url);
      imgObjectUrl = null;
      alert('Не удалось прочитать изображение.');
    };
    img.src = url;
  });

  window.addEventListener('resize', function () {
    if (raf) resize();
  });
})();
  </script>
</body>
</html>
